<section class="container mt-4">
    <article class="mb-4">
        <h2>Lista de equipamentos de Proteção Individual</h2>
    </article>
    <ul>
        <li>
            <strong>Capacete de Segurança</strong><br>
            Tipo: Proteção de cabeça <br>
            Validade: 12 meses
        </li>
        <li>
            <strong>Óculos de Proteção</strong><br>
            Tipo: Proteção dos olhos <br>
            Validade: 24 meses

            <strong>Luva de Proteção</strong><br>

        Enviar ID

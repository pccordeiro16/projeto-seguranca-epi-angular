<form [formGroup]="formulario" (ngSubmit)="salvar()" class="container form-control">
    <label for="nome" class="form-label">Nome do EPI</label>
    <input id="nome" type="text" formControlName="nome" class="form-control">

    <label for="categoria" class="form-label">Categoria</label>
    <input id="categoria" type="text" formControlName="categoria" class="form-control">

    <label for="ca" class="form-label">CA</label>
    <input id="ca" type="text" formControlName="ca" class="form-control">

    <button type="submit" class="btn btn-danger mt-2">Cadastrar</button>
</form>
